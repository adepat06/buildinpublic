<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BuildInPublic</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">
            🚀 BuildInPublic
        </a>

        <div>
            <a href="{% url 'profile' %}" class="btn btn-light btn-sm">
                Profile
            </a>

            <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">
                Logout
            </a>
        </div>
    </div>
</nav>


<div class="container mt-5">

    <div class="card shadow-sm mb-4">

        <div class="card-body">

            <h4>Create a Post</h4>

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button class="btn btn-primary">
                    Share Update
                </button>

            </form>

        </div>

    </div>


    {% for post in posts %}

    <div class="card shadow-sm mb-3">

        <div class="card-body">

            <h5>
                {{ post.user.username }}
            </h5>

            <p>
                {{ post.content }}
            </p>

            <small class="text-muted">
                {{ post.created_at }}
            </small>

        </div>

    </div>

    {% empty %}

    <div class="alert alert-info">
        No posts yet.
    </div>

    {% endfor %}

</div>

</body>
</html>
