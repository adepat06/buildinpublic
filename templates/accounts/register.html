{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow-lg">

            <div class="card-body p-5">

                <div class="text-center mb-4">

                    <h2 class="fw-bold">

                        🚀 Create Account

                    </h2>

                    <p class="text-muted">

                        Join BuildInPublic and share your journey.

                    </p>

                </div>

                <form method="POST">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <div class="d-grid mt-4">

                        <button class="btn btn-primary btn-lg">

                            Register

                        </button>

                    </div>

                </form>

                <div class="text-center mt-4">

                    Already have an account?

                    <a href="{% url 'login' %}">

                        Login

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
