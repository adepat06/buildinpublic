{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6 col-lg-5">

        <div class="card shadow-lg">

            <div class="card-body p-5">

                <div class="text-center mb-4">

                    <h2 class="fw-bold">

                        👋 Welcome Back

                    </h2>

                    <p class="text-muted">

                        Login to continue building in public.

                    </p>

                </div>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">

                            Username

                        </label>

                        {{ form.username }}

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            Password

                        </label>

                        {{ form.password }}

                    </div>

                    <div class="d-grid">

                        <button class="btn btn-primary btn-lg">

                            Login

                        </button>

                    </div>

                </form>

                <div class="text-center mt-4">

                    Don't have an account?

                    <a href="{% url 'register' %}">

                        Register

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
